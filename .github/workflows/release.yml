name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish GUI（win-x64，單一可執行檔）
        run: |
          dotnet publish NcmdumpCSharpGui `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none `
            -o publish/out

      - name: 建立 ZIP
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive `
            -Path publish/out/* `
            -DestinationPath "NcmdumpCSharpGui-$tag-win-x64.zip"

      - name: 建立 GitHub Release 並上傳 ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: NcmdumpCSharpGui-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
